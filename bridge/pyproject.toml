[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".."]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
extend-select = ["PLC0415", "PLW0603"]

[tool.mypy]
python_version = "3.10"
disallow_untyped_defs = true
# ignore_missing_imports removed - internal resolution now works via proper package structure
exclude = ["bridge/tests/"]

[[tool.mypy.overrides]]
module = ["websockets.*", "aiodocker", "aiodocker.*", "kubernetes_asyncio", "kubernetes_asyncio.*"]
ignore_missing_imports = true
