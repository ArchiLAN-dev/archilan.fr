name: archilan

services:
    postgres:
        image: postgres:17-alpine
        container_name: archilan-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-archilan}
            POSTGRES_USER: ${POSTGRES_USER:-archilan}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archilan_dev_password}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archilan} -d ${POSTGRES_DB:-archilan}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    mercure:
        image: dunglas/mercure:v0.15
        container_name: archilan-mercure
        restart: unless-stopped
        environment:
            SERVER_NAME: ":3001"
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY:-dev_mercure_jwt_secret_change_in_production}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY:-dev_mercure_jwt_secret_change_in_production}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins http://localhost:3000
                # anonymous: allows unauthenticated subscribers - dev only, never expose publicly
                anonymous
        ports:
            - "3001:3001"

    bridge-builder:
        build:
            context: ./bridge
        image: archilan-bridge:latest
        entrypoint: ["true"]

    archipelago-builder:
        build:
            context: ./archipelago
        image: archipelago:latest
        entrypoint: ["true"]

    orchestrateur:
        build:
            context: ./orchestrateur
        container_name: archilan-orchestrateur
        depends_on:
            - bridge-builder
            - archipelago-builder
        restart: unless-stopped
        environment:
            API_KEY: ${ORCHESTRATEUR_API_KEY:-dev_orchestrateur_key_change_me}
            BRIDGE_TOKEN: ${BRIDGE_TOKEN:-dev_bridge_token_change_me}
            PORT_RANGE_START: ${PORT_RANGE_START:-25000}
            PORT_RANGE_END: ${PORT_RANGE_END:-25099}
            DB_PATH: /data/orchestrateur.db
            DOCKER_HOST: unix:///var/run/docker.sock
            BRIDGE_IMAGE: ${BRIDGE_IMAGE:-archilan-bridge:latest}
            BRIDGE_NETWORK: archilan_default
            WEBHOOK_URL: ${ORCHESTRATEUR_WEBHOOK_URL:-}
            WEBHOOK_SECRET: ${ORCHESTRATEUR_WEBHOOK_SECRET:-}
            # Dev: the Symfony API runs on the host (the `api` service is commented out below),
            # so the bridge/orchestrateur reach it via host.docker.internal. Hardcoded (not
            # ${CENTRAL_API_URL}) so a stray CENTRAL_API_URL=localhost in the shell can't override
            # it — that breaks the bridge's callbacks. Prod uses docker-compose.prod.yml.
            CENTRAL_API_URL: http://host.docker.internal:8000
            CENTRAL_API_SECRET: ${CENTRAL_API_SECRET:-}
            CORS_ORIGINS: ${CORS_ORIGINS:-*}
            MINIO_ENDPOINT: ${ORCHESTRATEUR_MINIO_ENDPOINT:-minio:9000}
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
            MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
            MINIO_BUCKET_APWORLDS: ${MINIO_BUCKET_APWORLDS:-apworlds}
            MINIO_BUCKET_SESSIONS: ${MINIO_BUCKET_SESSIONS:-sessions}
            AP_IMAGE: ${AP_IMAGE:-archipelago:latest}
            AP_SERVER_PORT_OFFSET: ${AP_SERVER_PORT_OFFSET:-10000}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - orchestrateur-data:/data
        ports:
            - "${ORCHESTRATEUR_PORT:-8001}:8000"

    rabbitmq:
        image: rabbitmq:4-management-alpine
        container_name: archilan-rabbitmq
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-archilan}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-archilan_dev_password}
        ports:
            - "${RABBITMQ_PORT:-5672}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 10

    mailpit:
        image: axllent/mailpit:latest
        container_name: archilan-mailpit
        restart: unless-stopped
        ports:
            - "${MAILPIT_SMTP_PORT:-1025}:1025"
            - "${MAILPIT_UI_PORT:-8025}:8025"

    minio:
        image: minio/minio:latest
        container_name: archilan-minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        ports:
            - "${MINIO_API_PORT:-9000}:9000"
            - "${MINIO_CONSOLE_PORT:-9001}:9001"
        volumes:
            - minio-data:/data
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            interval: 10s
            timeout: 5s
            retries: 10

    createbuckets:
        image: minio/mc:latest
        container_name: archilan-minio-init
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
            mc mb --ignore-existing local/apworlds;
            mc mb --ignore-existing local/sessions;
            mc mb --ignore-existing local/media;
            "

