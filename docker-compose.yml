name: archilan

services:
    postgres:
        image: postgres:17-alpine
        container_name: archilan-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-archilan}
            POSTGRES_USER: ${POSTGRES_USER:-archilan}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archilan_dev_password}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archilan} -d ${POSTGRES_DB:-archilan}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    mercure:
        image: dunglas/mercure:v0.15
        container_name: archilan-mercure
        restart: unless-stopped
        environment:
            SERVER_NAME: ":3001"
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY:-dev_mercure_jwt_secret_change_in_production}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY:-dev_mercure_jwt_secret_change_in_production}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins http://localhost:3000
                # anonymous: allows unauthenticated subscribers - dev only, never expose publicly
                anonymous
        ports:
            - "3001:3001"

    archipelago:
        build:
            context: .
            dockerfile: archipelago/Dockerfile
        image: archipelago-server:latest
        container_name: archilan-archipelago
        restart: unless-stopped
        command: ["tail", "-f", "/dev/null"]
        volumes:
            - workspace:/workspace

    runner:
        build:
            context: ./runner
        container_name: archilan-runner
        restart: unless-stopped
        depends_on:
            - archipelago
        environment:
            RUNNER_API_KEY: ${RUNNER_API_KEY:-dev_runner_key_change_me}
            PORT_RANGE_START: ${PORT_RANGE_START:-25000}
            PORT_RANGE_END: ${PORT_RANGE_END:-25099}
            WORKSPACE_ROOT: /workspace
            ARCHIPELAGO_GENERATE_CMD: ${ARCHIPELAGO_GENERATE_CMD:-docker exec archilan-archipelago python3 /usr/local/bin/generate_multiworld.py}
            ARCHIPELAGO_TEMPLATE_CMD: ${ARCHIPELAGO_TEMPLATE_CMD:-docker exec archilan-archipelago python3 /usr/local/bin/generate_template.py}
            ARCHIPELAGO_SERVER_IMAGE: archipelago-server:latest
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - workspace:/workspace
        ports:
            - "${RUNNER_PORT:-8001}:8000"

    rabbitmq:
        image: rabbitmq:4-management-alpine
        container_name: archilan-rabbitmq
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-archilan}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-archilan_dev_password}
        ports:
            - "${RABBITMQ_PORT:-5672}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 10

    mailpit:
        image: axllent/mailpit:latest
        container_name: archilan-mailpit
        restart: unless-stopped
        ports:
            - "${MAILPIT_SMTP_PORT:-1025}:1025"
            - "${MAILPIT_UI_PORT:-8025}:8025"

    minio:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        container_name: archilan-minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        ports:
            - "${MINIO_API_PORT:-9000}:9000"
            - "${MINIO_CONSOLE_PORT:-9001}:9001"
        volumes:
            - minio-data:/data
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            interval: 10s
            timeout: 5s
            retries: 10

    createbuckets:
        image: minio/mc:RELEASE.2025-04-16T18-13-26Z
        container_name: archilan-minio-init
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
            mc mb --ignore-existing local/apworlds;
            mc mb --ignore-existing local/media;
            "

