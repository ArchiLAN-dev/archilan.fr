basePath: /
definitions:
  api.ConfigureResponse:
    properties:
      slots:
        items:
          $ref: '#/definitions/api.ConfigureSlotResponse'
        type: array
      valid:
        type: boolean
    type: object
  api.ConfigureSessionRequest:
    properties:
      slots:
        items:
          $ref: '#/definitions/api.ConfigureSlotEntry'
        type: array
    type: object
  api.ConfigureSlotEntry:
    properties:
      apworldHash:
        type: string
      playerYaml:
        type: string
    type: object
  api.ConfigureSlotResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      playerName:
        type: string
    type: object
  api.ContainerResponse:
    properties:
      containerId:
        type: string
      createdAt:
        type: string
      image:
        type: string
      port:
        type: integer
      sessionId:
        type: string
      status:
        description: starting | running | stopped | crashed
        type: string
      updatedAt:
        type: string
    type: object
  api.ContainersResponse:
    properties:
      containers:
        items:
          $ref: '#/definitions/api.ContainerResponse'
        type: array
    type: object
  api.CreateContainerRequest:
    properties:
      adminPassword:
        description: required
        example: s3cr3t
        type: string
      serverPassword:
        description: optional — leave empty for open games
        example: ""
        type: string
      sessionId:
        example: weekly-run-2026-05-20
        type: string
    type: object
  api.CreateContainerResponse:
    properties:
      port:
        example: 25000
        type: integer
      sessionId:
        example: weekly-run-2026-05-20
        type: string
      status:
        example: starting
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        example: session not found
        type: string
    type: object
  api.GenerateSessionRequest:
    properties:
      adminPassword:
        type: string
      seed:
        type: string
    type: object
  api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  api.LaunchSessionRequest:
    properties:
      adminPassword:
        type: string
      serverPassword:
        type: string
    type: object
  api.PreflightRequest:
    properties:
      slots:
        items:
          $ref: '#/definitions/api.PreflightSlot'
        type: array
    type: object
  api.PreflightResponse:
    properties:
      slots:
        items:
          $ref: '#/definitions/api.PreflightSlotResult'
        type: array
      valid:
        type: boolean
    type: object
  api.PreflightSlot:
    properties:
      apworldStorageKey:
        type: string
      archipelagoGameName:
        type: string
      options:
        items:
          $ref: '#/definitions/api.SlotOption'
        type: array
      playerName:
        type: string
      playerYaml:
        type: string
      slotId:
        type: string
    type: object
  api.PreflightSlotResult:
    properties:
      errors:
        items:
          type: string
        type: array
      proposedName:
        type: string
      slotId:
        type: string
    type: object
  api.SessionResponse:
    properties:
      apPort:
        type: integer
      bridgePort:
        type: integer
      createdAt:
        type: string
      outputFile:
        type: string
      serverPassword:
        type: string
      sessionId:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  api.SlotOption:
    properties:
      currentValue: {}
      defaultValue: {}
      key:
        type: string
      required:
        type: boolean
    type: object
  api.TemplateOption:
    properties:
      defaultValue: {}
      description:
        type: string
      key:
        type: string
      rangeMax:
        type: integer
      rangeMin:
        type: integer
      type:
        description: range | choice | toggle | text
        type: string
      validValues:
        items:
          type: string
        type: array
    type: object
  api.UploadApworldResponse:
    properties:
      hash:
        example: 0fd8936279e053df96110fcb7898447a9fb8655343b8f26c22108d79a73b4e21
        type: string
      options:
        items:
          $ref: '#/definitions/api.TemplateOption'
        type: array
    type: object
info:
  contact: {}
  description: Gestion des containers Bridge Archipelago — création, arrêt, suppression
    et monitoring.
  title: Archilan Orchestrateur API
  version: "1.0"
paths:
  /apworlds:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Stores the apworld in Minio, runs a one-shot Archipelago container to generate
        the default YAML template, stores it, and returns both the hash and the YAML.
      parameters:
      - description: The .apworld file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.UploadApworldResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload an apworld and generate its YAML template
      tags:
      - apworlds
  /apworlds/{hash}/yaml:
    get:
      description: Returns the default YAML template for the given apworld hash
      parameters:
      - description: Apworld SHA-256 hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get apworld default YAML template
      tags:
      - apworlds
  /containers:
    get:
      description: Returns all managed Bridge containers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ContainersResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List containers
      tags:
      - containers
    post:
      consumes:
      - application/json
      description: Allocates a port, starts a Bridge container, and records it. Returns
        immediately; webhook fires when container is ready.
      parameters:
      - description: Session info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateContainerRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.CreateContainerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Session already exists
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Port pool exhausted
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create container
      tags:
      - containers
  /containers/{sessionId}:
    delete:
      description: Force-removes a Bridge container and releases its port
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove container
      tags:
      - containers
    get:
      description: Returns a single managed Bridge container by session ID
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ContainerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get container
      tags:
      - containers
  /containers/{sessionId}/reload:
    post:
      description: Restarts a Bridge container
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reload container
      tags:
      - containers
  /containers/{sessionId}/stop:
    post:
      description: Sends SIGTERM to a running Bridge container
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop container
      tags:
      - containers
  /health:
    get:
      description: Returns ok when the service is up
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Health check
      tags:
      - system
  /sessions/{sessionId}:
    delete:
      description: Force-removes all resources for a session (containers, volume,
        DB record)
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete session
      tags:
      - sessions
    get:
      description: Returns the current state of a session
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get session
      tags:
      - sessions
  /sessions/{sessionId}/configure:
    post:
      consumes:
      - application/json
      description: |-
        Validates slot definitions, uploads player YAMLs and manifest to storage,
        and upserts the session as "draft". Idempotent: safe to call multiple times.
        Does NOT persist anything if any slot fails validation.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Slot definitions
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ConfigureSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ConfigureResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Session is generating, launching, or running
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Storage not configured
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Configure (draft) a session
      tags:
      - sessions
  /sessions/{sessionId}/generate:
    post:
      consumes:
      - application/json
      description: |-
        Enqueues an async multiworld generation for the given session ID.
        Downloads apworlds and YAMLs from storage, runs generate_multiworld.py in a one-shot container.
        Fires session.generated or session.crashed webhooks on completion.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Generation parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.GenerateSessionRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Already in progress
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Storage not configured
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start multiworld generation
      tags:
      - sessions
  /sessions/{sessionId}/launch:
    post:
      consumes:
      - application/json
      description: |-
        Allocates ports, starts AP server and Bridge containers for a generated session.
        Fires session.ready or session.crashed webhooks on completion.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Launch parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LaunchSessionRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Not ready
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Launch a generated session
      tags:
      - sessions
  /sessions/{sessionId}/launch-from-file:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Injects a pre-generated .archipelago file into the session volume and launches.
        Fires session.ready or session.crashed webhooks on completion.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: The .archipelago or .zip game file
        in: formData
        name: file
        required: true
        type: file
      - description: Admin password
        in: formData
        name: adminPassword
        required: true
        type: string
      - description: Server password (optional)
        in: formData
        name: serverPassword
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Launch session from a pre-built .archipelago file
      tags:
      - sessions
  /sessions/{sessionId}/preflight:
    post:
      consumes:
      - application/json
      description: |-
        Validates slot data (playerYaml, required options) and returns proposed slot names.
        Stateless — does not create or modify any session record.
      parameters:
      - description: Session ID (informational only)
        in: path
        name: sessionId
        required: true
        type: string
      - description: Slot list
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PreflightRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.PreflightResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Validate slots before generation
      tags:
      - sessions
  /sessions/{sessionId}/restart:
    post:
      consumes:
      - application/json
      description: Re-launches a session that previously crashed, reusing its generated
        output file.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Not ready (no output file or wrong state)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Restart a crashed session
      tags:
      - sessions
  /sessions/{sessionId}/stop:
    post:
      description: Sends SIGTERM to both Bridge and AP server containers and marks
        session as stopped.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop a running session
      tags:
      - sessions
securityDefinitions:
  BearerAuth:
    description: Bearer <API_KEY>
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
