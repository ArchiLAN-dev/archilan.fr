name: archilan-prod

services:

    # ─── Infrastructure ───────────────────────────────────────────────────────

    postgres:
        image: postgres:17-alpine
        container_name: archilan-postgres
        restart: always
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-archilan}
            POSTGRES_USER: ${POSTGRES_USER:-archilan}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archilan} -d ${POSTGRES_DB:-archilan}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:4-alpine
        container_name: archilan-rabbitmq
        restart: always
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-archilan}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        container_name: archilan-minio
        restart: always
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio-data:/data
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            interval: 10s
            timeout: 5s
            retries: 10

    createbuckets:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
            mc mb --ignore-existing local/apworlds;
            mc mb --ignore-existing local/sessions;
            mc mb --ignore-existing local/media;
            "

    mercure:
        image: dunglas/mercure:v0.15
        container_name: archilan-mercure
        restart: always
        environment:
            SERVER_NAME: ":3001"
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins ${FRONTEND_ORIGIN}
        ports:
            - "3001:3001"

    # ─── Application ──────────────────────────────────────────────────────────

    api-web:
        image: ghcr.io/archilan-dev/api-web:latest
        container_name: archilan-api-web
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.api-web.rule=Host(`${API_DOMAIN}`)"
            - "traefik.http.routers.api-web.entrypoints=websecure"
            - "traefik.http.routers.api-web.tls.certresolver=letsencrypt"
            - "traefik.http.services.api-web.loadbalancer.server.port=80"
            # Redirect HTTP → HTTPS
            - "traefik.http.routers.api-web-http.rule=Host(`${API_DOMAIN}`)"
            - "traefik.http.routers.api-web-http.entrypoints=web"
            - "traefik.http.routers.api-web-http.middlewares=redirect-https"
            - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: postgresql://${POSTGRES_USER:-archilan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-archilan}?serverVersion=17&charset=utf8
            MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-archilan}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
            MESSENGER_FAILED_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-archilan}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
            MERCURE_URL: http://mercure:3001/.well-known/mercure
            MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            JWT_SECRET_KEY: /run/secrets/jwt_private
            JWT_PUBLIC_KEY: /run/secrets/jwt_public
            JWT_PASSPHRASE: ${JWT_PASSPHRASE}
            FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
            DEFAULT_URI: ${DEFAULT_URI}
            MAILER_DSN: ${MAILER_DSN}
            MAILER_SENDER: ${MAILER_SENDER:-noreply@archilan.fr}
            MINIO_ENDPOINT: http://minio:9000
            MINIO_PRESIGN_ENDPOINT: ${MINIO_PRESIGN_ENDPOINT}
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
            MINIO_BUCKET_APWORLDS: ${MINIO_BUCKET_APWORLDS:-apworlds}
            MINIO_BUCKET_SAVES: ${MINIO_BUCKET_SAVES:-sessions}
            MINIO_BUCKET_MEDIA: ${MINIO_BUCKET_MEDIA:-media}
            ORCHESTRATEUR_API_KEY: ${ORCHESTRATEUR_API_KEY}
            ORCHESTRATEUR_WEBHOOK_SECRET: ${ORCHESTRATEUR_WEBHOOK_SECRET}
            RUNNER_BASE_URL: http://orchestrateur:8000
            RUNNER_PUBLIC_HOST: ${RUNNER_PUBLIC_HOST}
            BRIDGE_INTERNAL_TOKEN: ${BRIDGE_INTERNAL_TOKEN}
            CENTRAL_API_SECRET: ${CENTRAL_API_SECRET}
            DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
            DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
            DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
            DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
            DISCORD_ROLE_ID_ADMIN: ${DISCORD_ROLE_ID_ADMIN}
            DISCORD_ROLE_ID_MEMBER: ${DISCORD_ROLE_ID_MEMBER}
            DISCORD_REDIRECT_URI_AUTH: ${DISCORD_REDIRECT_URI_AUTH}
            DISCORD_REDIRECT_URI_LINK: ${DISCORD_REDIRECT_URI_LINK}
            TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
            TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
            TWITCH_CHANNEL_LOGIN: ${TWITCH_CHANNEL_LOGIN:-archilan}
            HELLOASSO_CLIENT_ID: ${HELLOASSO_CLIENT_ID}
            HELLOASSO_CLIENT_SECRET: ${HELLOASSO_CLIENT_SECRET}
            HELLOASSO_ORGANIZATION_SLUG: ${HELLOASSO_ORGANIZATION_SLUG}
            HELLOASSO_SANDBOX: "false"
            HELLOASSO_MEMBERSHIP_FORM_SLUG: ${HELLOASSO_MEMBERSHIP_FORM_SLUG}
            HELLOASSO_SHOP_FORM_SLUG: ${HELLOASSO_SHOP_FORM_SLUG}
            EMAIL_HASH_SECRET: ${EMAIL_HASH_SECRET}
            TRAEFIK_TOKEN: ${TRAEFIK_TOKEN}
            WS_DOMAIN: ${WS_DOMAIN}
            WORKSPACE_DIR: /var/archilan/workspace
            ARCHIVE_DIR: /var/archilan/archives
            ARCHIPELAGO_GENERATE_IMAGE: ${ARCHIPELAGO_GENERATE_IMAGE:-archipelago:latest}
        volumes:
            - api-workspace:/var/archilan/workspace
            - api-archives:/var/archilan/archives

    api-worker:
        image: ghcr.io/archilan-dev/api-worker:latest
        container_name: archilan-api-worker
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: postgresql://${POSTGRES_USER:-archilan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-archilan}?serverVersion=17&charset=utf8
            MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-archilan}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
            MESSENGER_FAILED_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-archilan}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
            MERCURE_URL: http://mercure:3001/.well-known/mercure
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            JWT_SECRET_KEY: /run/secrets/jwt_private
            JWT_PUBLIC_KEY: /run/secrets/jwt_public
            JWT_PASSPHRASE: ${JWT_PASSPHRASE}
            MINIO_ENDPOINT: http://minio:9000
            MINIO_PRESIGN_ENDPOINT: ${MINIO_PRESIGN_ENDPOINT}
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
            MINIO_BUCKET_APWORLDS: ${MINIO_BUCKET_APWORLDS:-apworlds}
            MINIO_BUCKET_SAVES: ${MINIO_BUCKET_SAVES:-sessions}
            MINIO_BUCKET_MEDIA: ${MINIO_BUCKET_MEDIA:-media}
            ORCHESTRATEUR_API_KEY: ${ORCHESTRATEUR_API_KEY}
            RUNNER_BASE_URL: http://orchestrateur:8000
            BRIDGE_INTERNAL_TOKEN: ${BRIDGE_INTERNAL_TOKEN}
            MAILER_DSN: ${MAILER_DSN}
            MAILER_SENDER: ${MAILER_SENDER:-noreply@archilan.fr}
            DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
            DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
            WORKSPACE_DIR: /var/archilan/workspace
            ARCHIVE_DIR: /var/archilan/archives
            DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
            ARCHIPELAGO_GENERATE_IMAGE: ${ARCHIPELAGO_GENERATE_IMAGE:-archipelago:latest}
        volumes:
            - api-workspace:/var/archilan/workspace
            - api-archives:/var/archilan/archives
            - /var/run/docker.sock:/var/run/docker.sock

    frontend:
        image: ghcr.io/archilan-dev/frontend:latest
        container_name: archilan-frontend
        restart: always
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
            - "traefik.http.routers.frontend.entrypoints=websecure"
            - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
            - "traefik.http.services.frontend.loadbalancer.server.port=3000"
            - "traefik.http.routers.frontend-http.rule=Host(`${FRONTEND_DOMAIN}`)"
            - "traefik.http.routers.frontend-http.entrypoints=web"
            - "traefik.http.routers.frontend-http.middlewares=redirect-https"
        environment:
            NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
            NEXT_PUBLIC_MERCURE_URL: ${MERCURE_PUBLIC_URL}
            NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: ${TWITCH_CHANNEL_LOGIN:-archilan}

    orchestrateur:
        image: ghcr.io/archilan-dev/orchestrateur:latest
        container_name: archilan-orchestrateur
        restart: always
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.orchestrateur.rule=Host(`${ORCHESTRATEUR_DOMAIN}`)"
            - "traefik.http.routers.orchestrateur.entrypoints=websecure"
            - "traefik.http.routers.orchestrateur.tls.certresolver=letsencrypt"
            - "traefik.http.services.orchestrateur.loadbalancer.server.port=8000"
        environment:
            API_KEY: ${ORCHESTRATEUR_API_KEY}
            BRIDGE_TOKEN: ${BRIDGE_INTERNAL_TOKEN}
            PORT_RANGE_START: ${PORT_RANGE_START:-25000}
            PORT_RANGE_END: ${PORT_RANGE_END:-25099}
            DB_PATH: /data/orchestrateur.db
            DOCKER_HOST: unix:///var/run/docker.sock
            BRIDGE_IMAGE: ${BRIDGE_IMAGE:-ghcr.io/archilan-dev/bridge:latest}
            BRIDGE_NETWORK: archilan-prod_default
            WEBHOOK_URL: http://api-web/api/v1/internal/orchestrateur/webhook
            WEBHOOK_SECRET: ${ORCHESTRATEUR_WEBHOOK_SECRET}
            CENTRAL_API_URL: http://api-web
            CENTRAL_API_SECRET: ${CENTRAL_API_SECRET}
            MINIO_ENDPOINT: minio:9000
            MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
            MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
            MINIO_USE_SSL: "false"
            MINIO_BUCKET_APWORLDS: ${MINIO_BUCKET_APWORLDS:-apworlds}
            MINIO_BUCKET_SESSIONS: ${MINIO_BUCKET_SESSIONS:-sessions}
            AP_IMAGE: ${AP_IMAGE:-ghcr.io/archilan-dev/archipelago:latest}
            AP_SERVER_PORT_OFFSET: ${AP_SERVER_PORT_OFFSET:-10000}
            CORS_ORIGINS: ${CORS_ORIGINS:-${FRONTEND_ORIGIN}}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - orchestrateur-data:/data

networks:
    default: {}
    archilan-proxy:
        external: true
        name: archilan-proxy

volumes:
    postgres-data:
    rabbitmq-data:
    minio-data:
    orchestrateur-data:
    api-workspace:
    api-archives:
