name: archilan-prod

services:

    # ─── Infrastructure ───────────────────────────────────────────────────────

    postgres:
        image: postgres:17-alpine
        container_name: archilan-postgres
        restart: always
        env_file: envs/postgres.env
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-archilan} -d $${POSTGRES_DB:-archilan}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:4-alpine
        container_name: archilan-rabbitmq
        restart: always
        env_file: envs/rabbitmq.env
        volumes:
            - rabbitmq-data:/var/lib/rabbitmq
        healthcheck:
            test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        container_name: archilan-minio
        restart: always
        command: server /data --console-address ":9001"
        env_file: envs/minio.env
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio-data:/data
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            interval: 10s
            timeout: 5s
            retries: 10

    createbuckets:
        image: minio/mc:latest
        env_file: envs/minio.env
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
            mc mb --ignore-existing local/apworlds;
            mc mb --ignore-existing local/sessions;
            mc mb --ignore-existing local/media;
            "

    mercure:
        image: dunglas/mercure:v0.15
        container_name: archilan-mercure
        restart: always
        env_file: envs/mercure.env
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.mercure.rule=Host(`${MERCURE_DOMAIN}`)"
            - "traefik.http.routers.mercure.entrypoints=websecure"
            - "traefik.http.routers.mercure.tls.certresolver=letsencrypt"
            - "traefik.http.services.mercure.loadbalancer.server.port=3001"
            - "traefik.http.routers.mercure-http.rule=Host(`${MERCURE_DOMAIN}`)"
            - "traefik.http.routers.mercure-http.entrypoints=web"
            - "traefik.http.routers.mercure-http.middlewares=redirect-https"

    # ─── Application ──────────────────────────────────────────────────────────

    api-web:
        image: ghcr.io/archilan-dev/api-web:latest
        container_name: archilan-api-web
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        env_file: envs/api.env
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.api-web.rule=Host(`${API_DOMAIN}`)"
            - "traefik.http.routers.api-web.entrypoints=websecure"
            - "traefik.http.routers.api-web.tls.certresolver=letsencrypt"
            - "traefik.http.services.api-web.loadbalancer.server.port=80"
            - "traefik.http.routers.api-web-http.rule=Host(`${API_DOMAIN}`)"
            - "traefik.http.routers.api-web-http.entrypoints=web"
            - "traefik.http.routers.api-web-http.middlewares=redirect-https"
            - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
        volumes:
            - api-workspace:/var/archilan/workspace
            - api-archives:/var/archilan/archives
            - api-logs:/app/var/log

    api-worker:
        image: ghcr.io/archilan-dev/api-worker:latest
        container_name: archilan-api-worker
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        env_file: envs/api.env
        volumes:
            - api-workspace:/var/archilan/workspace
            - api-archives:/var/archilan/archives
            - api-logs:/app/var/log
            - /var/run/docker.sock:/var/run/docker.sock

    frontend:
        image: ghcr.io/archilan-dev/frontend:latest
        container_name: archilan-frontend
        restart: always
        env_file: envs/frontend.env
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
            - "traefik.http.routers.frontend.entrypoints=websecure"
            - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
            - "traefik.http.services.frontend.loadbalancer.server.port=3000"
            - "traefik.http.routers.frontend-http.rule=Host(`${FRONTEND_DOMAIN}`)"
            - "traefik.http.routers.frontend-http.entrypoints=web"
            - "traefik.http.routers.frontend-http.middlewares=redirect-https"

    orchestrateur:
        image: ghcr.io/archilan-dev/orchestrateur:latest
        container_name: archilan-orchestrateur
        restart: always
        env_file: envs/orchestrateur.env
        networks:
            - default
            - archilan-proxy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=archilan-proxy"
            - "traefik.http.routers.orchestrateur.rule=Host(`${ORCHESTRATEUR_DOMAIN}`)"
            - "traefik.http.routers.orchestrateur.entrypoints=websecure"
            - "traefik.http.routers.orchestrateur.tls.certresolver=letsencrypt"
            - "traefik.http.services.orchestrateur.loadbalancer.server.port=8000"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - orchestrateur-data:/data

networks:
    default: {}
    archilan-proxy:
        external: true
        name: archilan-proxy

volumes:
    postgres-data:
    rabbitmq-data:
    minio-data:
    orchestrateur-data:
    api-workspace:
    api-archives:
    api-logs:
