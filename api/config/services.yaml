# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters
parameters:
    default_minio_apworlds_bucket: 'apworlds'
    default_minio_saves_bucket: 'archipelago-saves'
    default_minio_media_bucket: 'media'
    default_minio_presign_ttl: 3600
    default_minio_endpoint: 'http://localhost:9000'
    default_minio_access_key: 'minioadmin'
    default_minio_secret_key: 'minioadmin'
    default_empty_string: ''
    default_inactivity_timeout: 3600

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $appSecret: '%kernel.secret%'
            string $emailHashSecret: '%env(EMAIL_HASH_SECRET)%'
            string $mailerSender: '%env(MAILER_SENDER)%'
            string $centralApiSecret: '%env(CENTRAL_API_SECRET)%'
            string $githubToken: '%env(default:default_empty_string:GITHUB_TOKEN)%'
            string $spreadsheetId: '%env(default:default_empty_string:GOOGLE_SHEETS_SPREADSHEET_ID)%'
            string $googleApiKey: '%env(default:default_empty_string:GOOGLE_API_KEY)%'
            string $minioApworldsBucket: '%env(default:default_minio_apworlds_bucket:MINIO_BUCKET_APWORLDS)%'
            string $minioSavesBucket: '%env(default:default_minio_saves_bucket:MINIO_BUCKET_SAVES)%'
            string $minioMediaBucket: '%env(default:default_minio_media_bucket:MINIO_BUCKET_MEDIA)%'
            int $minioPresignTtl: '%env(default:default_minio_presign_ttl:int:MINIO_PRESIGN_TTL_SECONDS)%'
            string $siteUrl: '%env(FRONTEND_ORIGIN)%'
            string $discordInviteUrl: '%env(default:default_empty_string:DISCORD_INVITE_URL)%'
            string $bridgeInternalToken: '%env(default:default_empty_string:BRIDGE_INTERNAL_TOKEN)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Shared/Domain/'
            - '../src/Identity/Domain/'
            - '../src/Events/Domain/'
            - '../src/Registrations/Domain/'
            - '../src/GameSelection/Domain/'
            - '../src/Content/Domain/'
            - '../src/Payments/Domain/'
            - '../src/Realtime/Domain/'
            - '../src/Communications/Domain/'
            - '../src/Legal/Domain/'
            - '../src/Streaming/Domain/'
            - '../src/Sessions/Domain/'
            - '../src/PersonalRuns/Domain/'
            - '../src/CatalogSync/Domain/'
            - '../src/Membership/Domain/'
            - '../src/WeeklyRuns/Domain/'

    App\WeeklyRuns\Domain\WeeklyRunRepositoryInterface: '@App\WeeklyRuns\Infrastructure\DoctrineWeeklyRunRepository'
    App\WeeklyRuns\Domain\WeeklyTemplateRepositoryInterface: '@App\WeeklyRuns\Infrastructure\DoctrineWeeklyTemplateRepository'
    App\WeeklyRuns\Domain\WeeklyEntryRepositoryInterface: '@App\WeeklyRuns\Infrastructure\DoctrineWeeklyEntryRepository'
    App\WeeklyRuns\Application\CurrentWeeklyRunsQueryInterface: '@App\WeeklyRuns\Infrastructure\DbalCurrentWeeklyRunsQuery'
