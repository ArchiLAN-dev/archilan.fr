framework:
    messenger:
        transports:
            scheduler_default:
                dsn: 'schedule://default'
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: async
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0
            async_failed:
                dsn: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: async_failed
            run_generation:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: run_generation
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
                    max_delay: 0
            run_server:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: run_server
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
                    max_delay: 0
        failure_transport: async_failed

        routing:
            'App\Communications\Application\RegistrationConfirmationMessage': async
            'App\Communications\Application\PasswordResetMessage': async
            'App\Communications\Application\EmailConfirmationMessage': async
            'App\Communications\Application\SessionRunningMessage': async
            'App\Events\Application\EventCapacityReachedMessage': async
            'App\Payments\Application\SyncHelloAssoFormMessage': async
            'App\Sessions\Application\Message\GenerateRunJob': run_generation
            'App\Sessions\Application\Message\StartRunJob': run_server
            'App\Sessions\Application\Message\StopRunJob': run_server
            'App\Sessions\Application\Message\RestartRunJob': run_server
            'App\Sessions\Application\Message\RunHealthCheckJob': run_server
            'App\Sessions\Application\Message\FetchLogsJob': run_server
            'App\Sessions\Application\Message\ArchiveRunJob': run_server
            'App\PersonalRuns\Application\Message\LaunchPersonalRunJob': run_server
            'App\PersonalRuns\Application\Message\StopPersonalRunJob': run_server
            'App\Identity\Application\Message\CleanupRefreshTokensMessage': async
            'App\Sessions\Application\ScheduledTask\CleanupStaleSessionsTask': async
            'App\Sessions\Application\ScheduledTask\InactivityWatchdogMessage': async
            'App\Sessions\Application\Message\PauseRunJob': run_server
            'App\Sessions\Application\Message\ResumeRunJob': run_server
            'App\Communications\Application\SessionPausedWithoutSaveMessage': async
            'App\Communications\Application\SessionRestartFailedMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                run_generation: 'in-memory://'
                run_server: 'in-memory://'
