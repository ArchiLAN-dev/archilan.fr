nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: ['%env(FRONTEND_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'X-CSRF-Token', 'Authorization']
        expose_headers: []
        allow_credentials: true
        max_age: 3600
    paths:
        '^/api/': null
