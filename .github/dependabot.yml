version: 2

updates:
  # ── Backend (Composer) ──────────────────────────────────────────────────────
  - package-ecosystem: composer
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      composer-minor-patch:
        update-types:
          - minor
          - patch

  # ── Frontend (npm / pnpm lockfile) ──────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions versions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # ── Docker base images ──────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
