name: Backend Quality

on:
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: archilan
          POSTGRES_PASSWORD: archilan_dev_password
          POSTGRES_DB: archilan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archilan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, pdo_pgsql, pgsql
          coverage: pcov
          tools: composer:v2

      - name: Configure Composer GitHub token
        run: composer config -g github-oauth.github.com ${{ secrets.COMPOSER_GITHUB_TOKEN }}

      - name: Validate Composer
        run: composer validate

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # warn-only for now: pre-existing advisories (e.g. symfony/yaml low CVE) are
      # being cleared via Dependabot PRs. Flip to a hard gate (drop continue-on-error)
      # once the backlog is green — story 0.7 AC3.
      - name: Composer audit (known vulnerabilities)
        run: composer audit
        continue-on-error: true

      - name: PHPStan
        run: composer phpstan

      - name: PHP CS Fixer
        run: composer cs-fixer

      - name: Architecture
        run: composer arch

      - name: PHPUnit with coverage
        run: composer test -- --coverage-clover coverage.xml --coverage-html coverage-html

      # warn-only until the baseline is read from the first CI run; then set MIN to
      # (baseline − small margin) and drop continue-on-error to make it a hard gate.
      - name: Coverage floor
        if: matrix.php == '8.4'
        continue-on-error: true
        env:
          MIN: '0'
        run: |
          php -r '$x=simplexml_load_file("coverage.xml");$m=$x->project->metrics;$s=(int)$m["statements"];$c=(int)$m["coveredstatements"];$p=$s?100.0*$c/$s:0.0;$min=(float)getenv("MIN");printf("Line coverage: %.2f%% (floor %.0f%%)\n",$p,$min);if($p+1e-9<$min){fwrite(STDERR,sprintf("Coverage %.2f%% is below the %.0f%% floor\n",$p,$min));exit(1);}'

      - name: Upload coverage report
        if: matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage-html/
          retention-days: 30
