name: Docker Publish

on:
  # Build/publish images only on the integration branches (develop), prod (main) and release
  # tags - not on feature-branch PRs - to stay within the monthly Actions minutes budget.
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
    paths:
      - 'api/**'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: archilan-dev

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-web:
    name: API (web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/api-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.web
          load: true
          tags: api-web:scan
          secrets: composer_token=${{ secrets.COMPOSER_GITHUB_TOKEN }}
          cache-from: type=gha,scope=api-web
          cache-to: type=gha,mode=max,scope=api-web

      - name: Trivy scan (api-web)
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true  # warn-only: surfaces base-image CVEs without blocking (no GHAS/SARIF on this repo)
        with:
          image-ref: api-web:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: composer_token=${{ secrets.COMPOSER_GITHUB_TOKEN }}
          cache-from: type=gha,scope=api-web
          cache-to: type=gha,mode=max,scope=api-web

  api-worker:
    name: API (worker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/api-worker
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          load: true
          tags: api-worker:scan
          secrets: |
            composer_token=${{ secrets.COMPOSER_GITHUB_TOKEN }}
          cache-from: type=gha,scope=api-worker
          cache-to: type=gha,mode=max,scope=api-worker

      - name: Trivy scan (api-worker)
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true  # warn-only: surfaces base-image CVEs without blocking (no GHAS/SARIF on this repo)
        with:
          image-ref: api-worker:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            composer_token=${{ secrets.COMPOSER_GITHUB_TOKEN }}
          cache-from: type=gha,scope=api-worker
          cache-to: type=gha,mode=max,scope=api-worker

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: frontend:scan
          build-args: |
            NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN=${{ vars.NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN || 'archilan' }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.archilan.fr' }}
            NEXT_PUBLIC_MERCURE_URL=${{ vars.NEXT_PUBLIC_MERCURE_URL || 'https://mercure.archilan.fr/.well-known/mercure' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://archilan.fr' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true  # warn-only: surfaces base-image CVEs without blocking (no GHAS/SARIF on this repo)
        with:
          image-ref: frontend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN=${{ vars.NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN || 'archilan' }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.archilan.fr' }}
            NEXT_PUBLIC_MERCURE_URL=${{ vars.NEXT_PUBLIC_MERCURE_URL || 'https://mercure.archilan.fr/.well-known/mercure' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://archilan.fr' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
