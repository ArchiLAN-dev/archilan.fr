name: Frontend Quality

on:
  # Runs on every PR/push to the integration branch (develop) and prod (main). The workflow always
  # starts so the required "Frontend" check is always reported; a path filter (job `changes`) gates the
  # heavy `checks` job to frontend changes only, keeping Actions minutes low. This makes the check
  # compatible with branch protection: a PR that doesn't touch frontend/ is never left blocked on a
  # check that would otherwise be skipped at the workflow level. Use workflow_dispatch to run on demand.
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend.yml'

  checks:
    name: Frontend checks
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # warn-only for now: pre-existing high advisories (e.g. Next.js < 16.2.5) are
      # being cleared via Dependabot PRs. Flip to a hard gate (drop continue-on-error)
      # once the backlog is green - story 0.7 AC3.
      - name: Audit (high+ severity)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test if available
        run: pnpm run --if-present test
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Bundle analysis
        run: ANALYZE=true pnpm exec next build --webpack
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: frontend/.next/analyze/
          retention-days: 30

  frontend:
    # Required status check. Always runs (if: always) so it is always reported to branch protection,
    # and is green when frontend/ is unchanged (heavy `checks` job skipped) or when the checks pass.
    name: Frontend
    needs: [changes, checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on frontend checks
        run: |
          result="${{ needs.checks.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "Frontend checks did not pass (result=$result)"
            exit 1
          fi
          echo "Frontend gate OK (frontend changed: ${{ needs.changes.outputs.frontend }}; checks: $result)"
