name: Frontend Quality

on:
  # CI runs only on the integration branches (develop) and prod (main) to stay within
  # the monthly Actions minutes budget. Feature branches/PRs rely on local quality gates;
  # use workflow_dispatch to run on demand.
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # warn-only for now: pre-existing high advisories (e.g. Next.js < 16.2.5) are
      # being cleared via Dependabot PRs. Flip to a hard gate (drop continue-on-error)
      # once the backlog is green - story 0.7 AC3.
      - name: Audit (high+ severity)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test if available
        run: pnpm run --if-present test
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Bundle analysis
        run: ANALYZE=true pnpm exec next build --webpack
        env:
          NEXT_PUBLIC_TWITCH_CHANNEL_LOGIN: test-channel

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: frontend/.next/analyze/
          retention-days: 30
